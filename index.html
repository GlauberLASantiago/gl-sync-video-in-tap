<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GL Sync-in-Tap</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect rx='20' width='100' height='100' fill='%23BCDFB9'/><text y='65' x='15' font-family='sans-serif' font-size='50' font-weight='bold' fill='%232c3e50'>GL</text></svg>">
    <style>
        :root {
            --primary: #BCDFB9;
            --accent: #C87F8B;
            --bg-overlay: rgba(18, 18, 22, 0.93);
            --panel-bg: rgba(30, 30, 36, 0.97);
            --card-bg: rgba(40, 40, 48, 0.98);
            --text: #e2e2e2;
            --text-muted: #888;
            --border: rgba(255,255,255,0.08);
            --border-active: rgba(255,255,255,0.18);
            --section-header-bg: rgba(255,255,255,0.04);
        }

        * { box-sizing: border-box; }

        body {
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            color: var(--text);
            margin: 0;
            padding: 0.6rem;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            background-image: url('https://raw.githubusercontent.com/GlauberLASantiago/fundos/main/musica/Gemini_Generated_Image_%20(4).png');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            background-color: #111;
        }

        .app-wrapper {
            background-color: var(--bg-overlay);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border-radius: 10px;
            width: 100%;
            max-width: 1200px;
            box-shadow: 0 16px 40px rgba(0,0,0,0.6);
            overflow: hidden;
            border: 1px solid var(--border-active);
        }

        /* ── Header ── */
        .app-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0.6rem 1rem;
            background: rgba(0,0,0,0.3);
            border-bottom: 1px solid var(--border);
        }

        .brand-block { display: flex; align-items: center; gap: 0.6rem; }
        .brand-logo {
            width: 32px; height: 32px; border-radius: 6px;
            background: var(--primary);
            display: flex; align-items: center; justify-content: center;
            font-weight: 900; font-size: 0.85rem; color: #1a1a1a;
            letter-spacing: -1px;
        }
        .brand-title { font-weight: 800; font-size: 1.1rem; color: #fff; margin: 0; line-height: 1; }
        .brand-sub { font-size: 0.68rem; color: var(--text-muted); margin: 0; }

        .header-actions { display: flex; gap: 6px; align-items: center; }

        .layout-selector {
            display: flex;
            gap: 3px;
            background: rgba(0,0,0,0.4);
            padding: 3px;
            border-radius: 5px;
            border: 1px solid var(--border);
        }
        .layout-btn {
            background: transparent; color: var(--text-muted);
            font-size: 0.7rem; padding: 3px 9px;
            border-radius: 3px; font-weight: 700; border: none;
            cursor: pointer; transition: all 0.15s;
        }
        .layout-btn.active { background: var(--primary); color: #111; }
        .layout-btn:hover:not(.active) { color: var(--text); }

        /* ── Layout Grid ── */
        .main-layout {
            display: grid;
            grid-template-columns: 1fr 340px;
            gap: 0;
        }

        /* ── Video Side ── */
        .video-side {
            padding: 0.8rem;
            display: flex;
            flex-direction: column;
            gap: 0.7rem;
            border-right: 1px solid var(--border);
        }

        .video-wrapper {
            position: relative;
            background: #000;
            border-radius: 7px;
            overflow: hidden;
            aspect-ratio: 16/9;
            border: 1px solid var(--border);
        }
        video { width: 100%; height: 100%; display: block; }

        .timecode-overlay {
            position: absolute;
            top: 10px; left: 10px;
            background: rgba(0,0,0,0.88);
            color: var(--primary);
            padding: 4px 12px;
            border-radius: 4px;
            font-family: 'Courier New', monospace;
            font-size: 1.15rem;
            font-weight: bold;
            pointer-events: none;
            border-left: 3px solid var(--accent);
            letter-spacing: 1px;
        }

        /* Status bar below video */
        .video-status {
            display: flex;
            gap: 6px;
            align-items: center;
        }
        .status-pill {
            background: rgba(0,0,0,0.4);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 3px 10px;
            font-size: 0.7rem;
            color: var(--text-muted);
            display: flex; gap: 5px; align-items: center;
        }
        .status-pill.active { border-color: var(--primary); color: var(--primary); }
        .status-pill .dot { width: 6px; height: 6px; border-radius: 50%; background: var(--text-muted); }
        .status-pill.active .dot { background: var(--primary); animation: pulse 1s infinite; }
        @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.3} }

        /* ── Controls Side ── */
        .controls-side {
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* ── Accordion Section ── */
        .section {
            border-bottom: 1px solid var(--border);
            overflow: hidden;
        }

        .section-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0.55rem 0.9rem;
            cursor: pointer;
            user-select: none;
            background: var(--section-header-bg);
            transition: background 0.15s;
        }
        .section-header:hover { background: rgba(255,255,255,0.07); }

        .section-label {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 0.72rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            color: var(--text-muted);
        }
        .section-label .icon {
            width: 22px; height: 22px;
            background: rgba(255,255,255,0.06);
            border-radius: 4px;
            display: flex; align-items: center; justify-content: center;
            font-size: 0.85rem;
        }
        .section-open .section-label { color: var(--text); }
        .section-open .section-label .icon { background: var(--primary); }

        .section-chevron {
            font-size: 0.7rem; color: var(--text-muted);
            transition: transform 0.2s;
        }
        .section-open .section-chevron { transform: rotate(180deg); color: var(--primary); }

        .section-badge {
            background: var(--accent);
            color: #fff;
            font-size: 0.6rem;
            font-weight: 800;
            padding: 1px 5px;
            border-radius: 10px;
            margin-left: auto;
            margin-right: 6px;
        }

        .section-body {
            display: none;
            padding: 0.75rem 0.9rem;
            gap: 0.65rem;
            flex-direction: column;
            background: rgba(0,0,0,0.15);
        }
        .section-open .section-body { display: flex; }

        /* ── Form Controls ── */
        label.field-label {
            font-weight: 700; font-size: 0.67rem; text-transform: uppercase;
            letter-spacing: 0.06em; color: var(--text-muted); display: block;
            margin-bottom: 3px;
        }

        input[type="number"], input[type="file"], input[type="range"], select, input[type="text"] {
            background-color: rgba(15, 15, 18, 0.9);
            color: #fff;
            padding: 0.38rem 0.5rem;
            border: 1px solid var(--border-active);
            border-radius: 5px;
            font-family: inherit;
            font-size: 0.82rem;
            width: 100%;
        }
        input:focus, select:focus { outline: none; border-color: var(--primary); }

        input[type="file"]::file-selector-button {
            background-color: #3a3a44; color: #fff; border: none;
            padding: 0.2rem 0.5rem; border-radius: 3px; cursor: pointer;
            font-size: 0.72rem; margin-right: 6px;
        }
        input[type="file"]::file-selector-button:hover { background-color: #4a4a54; }

        .video-name-tag {
            display: none;
            background: rgba(188, 223, 185, 0.1);
            border: 1px solid rgba(188, 223, 185, 0.25);
            border-radius: 4px;
            padding: 4px 8px;
            font-size: 0.7rem;
            color: var(--primary);
            white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
        }

        /* Buttons */
        .btn {
            background: var(--primary); color: #111; font-weight: 700;
            border: none; padding: 0.42rem 0.7rem; border-radius: 5px;
            cursor: pointer; transition: all 0.15s; font-size: 0.82rem;
            width: 100%;
        }
        .btn:hover { filter: brightness(1.1); }
        .btn-accent { background: var(--accent); color: #fff; }
        .btn-outline { background: transparent; border: 1px solid var(--border-active); color: var(--text); }
        .btn-outline:hover { border-color: var(--primary); color: var(--primary); }
        .btn-sm { padding: 0.25rem 0.55rem; font-size: 0.72rem; width: auto; }
        .btn-danger { background: transparent; border: 1px solid #c87; color: #c87; }
        .btn-danger:hover { background: rgba(200, 120, 100, 0.15); }

        .btn-row { display: flex; gap: 6px; }
        .btn-row .btn { flex: 1; }

        /* Stepper */
        .stepper { display: flex; width: 100%; }
        .stepper .btn { width: 32px; flex: none; padding: 0; border-radius: 0; background: #3a3a44; color: #fff; }
        .stepper .btn:first-child { border-radius: 5px 0 0 5px; }
        .stepper .btn:last-child { border-radius: 0 5px 5px 0; }
        .stepper input { border-radius: 0; border-left: none; border-right: none; text-align: center; flex: 1; }

        /* Time signature */
        .time-sig { display: flex; width: 100%; }
        .time-sig input { border-radius: 5px 0 0 5px; text-align: center; flex: 1; }
        .time-sig span {
            background: rgba(255,255,255,0.05); padding: 0 6px;
            display: flex; align-items: center;
            border-top: 1px solid var(--border-active);
            border-bottom: 1px solid var(--border-active);
            color: var(--text-muted); font-size: 0.9rem;
        }
        .time-sig select { border-radius: 0 5px 5px 0; flex: 1; }

        .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
        .grid-3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 6px; }

        /* Mic monitor */
        .mic-row { display: flex; align-items: center; gap: 8px; }
        .mic-monitor {
            flex: 1; height: 10px;
            background: rgba(0,0,0,0.5);
            border-radius: 5px; overflow: hidden;
            position: relative; border: 1px solid var(--border-active);
        }
        .mic-level { height: 100%; width: 0%; background: var(--primary); border-radius: 5px; transition: width 0.05s; }
        .mic-threshold-marker { position: absolute; top: 0; bottom: 0; width: 2px; background: var(--accent); z-index: 2; }

        input[type="range"] {
            -webkit-appearance: none;
            height: 4px; padding: 0;
            background: rgba(255,255,255,0.1);
            border-radius: 2px; border: none;
        }
        input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 13px; height: 13px;
            border-radius: 50%;
            background: var(--primary); cursor: pointer;
        }

        /* Sync toggle */
        .sync-toggle {
            display: flex; align-items: center; justify-content: space-between;
            background: rgba(0,0,0,0.3); border-radius: 5px; padding: 6px 10px;
            border: 1px solid var(--border-active); cursor: pointer;
        }
        .sync-toggle-label { font-size: 0.78rem; color: var(--text-muted); }
        .toggle-switch {
            width: 34px; height: 18px; border-radius: 9px;
            background: #333; position: relative; transition: background 0.2s;
        }
        .toggle-switch.on { background: var(--primary); }
        .toggle-knob {
            position: absolute; top: 2px; left: 2px;
            width: 14px; height: 14px; border-radius: 50%;
            background: #888; transition: all 0.2s;
        }
        .toggle-switch.on .toggle-knob { left: 18px; background: #111; }

        /* ── Markers ── */
        .marker-list {
            display: flex; flex-direction: column; gap: 4px;
            max-height: 180px; overflow-y: auto;
        }
        .marker-list::-webkit-scrollbar { width: 4px; }
        .marker-list::-webkit-scrollbar-track { background: transparent; }
        .marker-list::-webkit-scrollbar-thumb { background: var(--border-active); border-radius: 2px; }

        .marker-item {
            background: rgba(0,0,0,0.25);
            border: 1px solid var(--border-active);
            border-radius: 5px;
            padding: 5px 7px;
            display: grid;
            grid-template-columns: 70px 1fr auto auto;
            gap: 5px;
            align-items: center;
        }
        .marker-item:hover { border-color: rgba(188, 223, 185, 0.2); }
        .marker-times { display: flex; flex-direction: column; gap: 1px; }
        .marker-abs { color: var(--text-muted); font-family: monospace; font-size: 0.62rem; text-align: center; }
        .marker-input {
            background: transparent !important; border: none !important;
            border-bottom: 1px dashed rgba(255,255,255,0.1) !important;
            padding: 2px 4px !important; color: #fff !important;
            font-size: 0.78rem !important; border-radius: 0 !important;
        }
        .marker-time-input { color: var(--primary) !important; font-weight: bold; font-family: monospace; text-align: center; }
        .marker-input:focus { border-bottom-color: var(--primary) !important; outline: none; }

        .empty-state {
            color: var(--text-muted); font-size: 0.75rem;
            text-align: center; padding: 12px 0; font-style: italic;
        }

        /* ── Projects ── */
        .projects-grid {
            display: flex; gap: 8px;
            overflow-x: auto; padding-bottom: 4px;
        }
        .projects-grid::-webkit-scrollbar { height: 3px; }
        .projects-grid::-webkit-scrollbar-thumb { background: var(--border-active); }

        .project-card {
            min-width: 110px; max-width: 110px;
            background: rgba(0,0,0,0.4); border: 1px solid var(--border-active);
            border-radius: 5px; overflow: hidden; cursor: pointer;
            font-size: 0.72rem; transition: border-color 0.15s;
        }
        .project-card:hover { border-color: rgba(188, 223, 185, 0.35); }
        .project-thumb { width: 100%; height: 56px; background-size: cover; background-position: center; position: relative; }
        .project-dur {
            position: absolute; bottom: 3px; right: 3px;
            background: rgba(0,0,0,0.85); padding: 1px 5px;
            font-size: 0.62rem; font-family: monospace; border-radius: 2px; color: #fff;
        }
        .project-info { padding: 5
